{# booklets/templates/base.html #}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PDF Manager{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .btn-loading {
      pointer-events: none;
    }

    .btn-loading .btn-loading-spinner {
      display: inline-block;
    }

    .btn-loading-spinner {
      display: none;
      width: 1rem;
      height: 1rem;
      vertical-align: -0.125em;
    }
  </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'booklets:form' %}">PDF Manager</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarsExample">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.app_name == 'booklets' %}active{% endif %}"
            href="{% url 'booklets:form' %}"
          >
            Booklets
          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link {% if request.resolver_match.app_name == 'ocrpdf' %}active{% endif %}"
            href="{% url 'ocrpdf:form' %}"
          >
            OCR
          </a>
        </li>

	<li class="nav-item">
	  <a
	    class="nav-link {% if request.resolver_match.app_name == 'joinpdf' %}active{% endif %}"
	    href="{% url 'joinpdf:form' %}"
	  >
	    Join
	  </a>
	</li>

      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">
        {{ m }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const enhanceSubmitButtons = () => {
      document.querySelectorAll("form").forEach((form) => {
        form.addEventListener("submit", (event) => {
          const submitter = event.submitter || form.querySelector('button[type="submit"], input[type="submit"]');
          if (!submitter || submitter.disabled || submitter.dataset.loadingStarted === "true") {
            return;
          }

          submitter.dataset.loadingStarted = "true";
          submitter.classList.add("btn-loading");
          submitter.setAttribute("aria-busy", "true");
          submitter.disabled = true;

          if (submitter.tagName === "BUTTON") {
            const spinner = document.createElement("span");
            spinner.className = "spinner-border spinner-border-sm btn-loading-spinner me-2";
            spinner.setAttribute("aria-hidden", "true");
            submitter.prepend(spinner);
          }
        });
      });
    };

    enhanceSubmitButtons();
  })();
</script>
</body>
</html>
